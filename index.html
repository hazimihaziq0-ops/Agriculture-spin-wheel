<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Win</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    color:#ff5722;
}

#wheel{
    width:320px;
    height:320px;
    border-radius:50%;
    border:8px solid white;
    box-shadow:0 0 20px rgba(0,0,0,.2);

    background:
    conic-gradient(
        #ff5252 0deg 45deg,
        #ffd54f 45deg 90deg,
        #66bb6a 90deg 135deg,
        #42a5f5 135deg 180deg,
        #ab47bc 180deg 225deg,
        #ff7043 225deg 270deg,
        #26c6da 270deg 315deg,
        #ffee58 315deg 360deg
    );

    transition:transform 5s ease-out;
}

.pointer{
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:35px solid red;
    margin:auto;
    margin-bottom:-8px;
}

button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff5722;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#e64a19;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#333;
}
</style>

</head>
<body>

<div class="container">

<h1>🎉 Spin & Win 🎉</h1>

<div class="pointer"></div>

<div id="wheel"></div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

</div>

<script>

const prizes=[
"You win 10% Discount for any tool purchase",
"RM50 Voucher",
"Free Shipping",
"Better Luck Next Time",
"20% Discount",
"RM10 Voucher",
"Free Gift one set of seed",
"30% Discount"
];

let spinning=false;

function spin(){

if(spinning) return;

spinning=true;

const wheel=document.getElementById("wheel");

const random=Math.floor(Math.random()*8);

const degree=(360*6)+(random*45)+22;

wheel.style.transform=`rotate(${degree}deg)`;

setTimeout(()=>{

document.getElementById("result").innerHTML=
"🎁 You won: <br><br>"+prizes[random];

spinning=false;

},5000);

}

</script>

</body>
</html>
